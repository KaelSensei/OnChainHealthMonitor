version: "3.9"

services:
  # ─── Application Services ──────────────────────────────────────────────────

  collector:
    build:
      context: ./services/collector
      dockerfile: Dockerfile
    container_name: onchain_collector
    ports:
      - "8081:8081"
    restart: unless-stopped
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=otel-collector:4317
    labels:
      - "prometheus.scrape=true"
    depends_on:
      - otel-collector
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8081/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - onchain_network

  analyzer:
    build:
      context: ./services/analyzer
      dockerfile: Dockerfile
    container_name: onchain_analyzer
    ports:
      - "8082:8082"
    restart: unless-stopped
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=otel-collector:4317
    labels:
      - "prometheus.scrape=true"
    depends_on:
      - collector
      - otel-collector
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8082/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - onchain_network

  notifier:
    build:
      context: ./services/notifier
      dockerfile: Dockerfile
    container_name: onchain_notifier
    ports:
      - "8083:8083"
    restart: unless-stopped
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=otel-collector:4317
    labels:
      - "prometheus.scrape=true"
    depends_on:
      - analyzer
      - otel-collector
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8083/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - onchain_network

  api:
    build:
      context: ./services/api
      dockerfile: Dockerfile
    container_name: onchain_api
    ports:
      - "8080:8080"
    restart: unless-stopped
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=otel-collector:4317
    labels:
      - "prometheus.scrape=true"
    depends_on:
      - analyzer
      - otel-collector
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - onchain_network

  # ─── API Gateway ──────────────────────────────────────────────────────────

  kong:
    image: kong:3.7-ubuntu
    container_name: onchain_kong
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /kong/declarative/kong.yaml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: "0.0.0.0:8001"
      KONG_PROXY_LISTEN: "0.0.0.0:8000"
    volumes:
      - ./infra/kong:/kong/declarative
    ports:
      - "8000:8000"
      - "8001:8001"
    depends_on:
      - api
    networks:
      - onchain_network
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 10s
      retries: 3

  swagger-ui:
    image: swaggerapi/swagger-ui:v5.17.14
    container_name: onchain_swagger
    environment:
      - SWAGGER_JSON=/openapi/openapi.yaml
      - BASE_URL=/swagger
    volumes:
      - ./infra/api-spec:/openapi
    ports:
      - "8090:8080"
    networks:
      - onchain_network

  # ─── Observability Stack ───────────────────────────────────────────────────

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: onchain_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"
    restart: unless-stopped
    networks:
      - onchain_network

  grafana:
    image: grafana/grafana:10.4.0
    container_name: onchain_grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning
      - ./observability/grafana/provisioning/dashboards:/var/lib/grafana/dashboards
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
      - jaeger
    restart: unless-stopped
    networks:
      - onchain_network

  jaeger:
    image: jaegertracing/all-in-one:1.57
    container_name: onchain_jaeger
    ports:
      - "16686:16686"   # Jaeger UI
      - "4317:4317"     # OTLP gRPC (for direct export fallback)
      - "14250:14250"   # gRPC
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    restart: unless-stopped
    networks:
      - onchain_network

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.100.0
    container_name: onchain_otel_collector
    command: ["--config=/etc/otel/config.yaml"]
    volumes:
      - ./observability/otel/otel-collector-config.yaml:/etc/otel/config.yaml
    ports:
      - "4318:4318"     # OTLP HTTP
      - "55679:55679"   # zpages (debug)
    depends_on:
      - jaeger
    restart: unless-stopped
    networks:
      - onchain_network

volumes:
  grafana_data:

networks:
  onchain_network:
    driver: bridge
