apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: onchain-health-monitor
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:
      - job_name: 'collector'
        static_configs:
          - targets: ['collector:8081']
        metrics_path: /metrics

      - job_name: 'analyzer'
        static_configs:
          - targets: ['analyzer:8082']
        metrics_path: /metrics

      - job_name: 'notifier'
        static_configs:
          - targets: ['notifier:8083']
        metrics_path: /metrics

      - job_name: 'api'
        static_configs:
          - targets: ['api:8080']
        metrics_path: /metrics
