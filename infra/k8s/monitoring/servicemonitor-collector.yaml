apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: collector-monitor
  namespace: onchain-health-monitor
  labels:
    release: prometheus
    app.kubernetes.io/part-of: onchain-health-monitor
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: collector
  endpoints:
    - port: http
      path: /metrics
      interval: 15s
