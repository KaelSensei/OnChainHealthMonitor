<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="pulse" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d68f"/>
      <stop offset="50%" style="stop-color:#00e5a0"/>
      <stop offset="100%" style="stop-color:#00d68f"/>
    </linearGradient>
    <linearGradient id="hex" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a73e8;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#00d68f;stop-opacity:0.08"/>
    </linearGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a73e8;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#00d68f;stop-opacity:0.4"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="96" fill="url(#bg)"/>
  <circle cx="100" cy="100" r="96" fill="none" stroke="url(#ring)" stroke-width="1.5"/>

  <!-- Inner hexagon -->
  <polygon points="100,30 160.6,65 160.6,135 100,170 39.4,135 39.4,65"
           fill="url(#hex)" stroke="#1a73e8" stroke-width="1" stroke-opacity="0.3"/>

  <!-- Subtle grid dots (blockchain nodes) -->
  <circle cx="100" cy="30" r="3" fill="#1a73e8" opacity="0.4"/>
  <circle cx="160.6" cy="65" r="3" fill="#1a73e8" opacity="0.3"/>
  <circle cx="160.6" cy="135" r="3" fill="#1a73e8" opacity="0.3"/>
  <circle cx="100" cy="170" r="3" fill="#1a73e8" opacity="0.4"/>
  <circle cx="39.4" cy="135" r="3" fill="#1a73e8" opacity="0.3"/>
  <circle cx="39.4" cy="65" r="3" fill="#1a73e8" opacity="0.3"/>

  <!-- Heartbeat / pulse line -->
  <polyline
    points="30,100 55,100 65,100 72,100 78,80 84,120 90,70 96,130 102,85 108,100 115,100 125,100 135,100 140,100 148,88 154,112 160,100 170,100"
    fill="none"
    stroke="url(#pulse)"
    stroke-width="2.8"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Glow effect on pulse -->
  <polyline
    points="30,100 55,100 65,100 72,100 78,80 84,120 90,70 96,130 102,85 108,100 115,100 125,100 135,100 140,100 148,88 154,112 160,100 170,100"
    fill="none"
    stroke="#00e5a0"
    stroke-width="6"
    stroke-linecap="round"
    stroke-linejoin="round"
    opacity="0.15"
  />

  <!-- Small chain link icons -->
  <!-- Left chain -->
  <g transform="translate(52, 58)" opacity="0.5">
    <rect x="0" y="0" width="8" height="12" rx="3" fill="none" stroke="#8b949e" stroke-width="1.2"/>
    <rect x="4" y="4" width="8" height="12" rx="3" fill="none" stroke="#8b949e" stroke-width="1.2"/>
  </g>
  <!-- Right chain -->
  <g transform="translate(140, 130)" opacity="0.5">
    <rect x="0" y="0" width="8" height="12" rx="3" fill="none" stroke="#8b949e" stroke-width="1.2"/>
    <rect x="4" y="4" width="8" height="12" rx="3" fill="none" stroke="#8b949e" stroke-width="1.2"/>
  </g>
</svg>
