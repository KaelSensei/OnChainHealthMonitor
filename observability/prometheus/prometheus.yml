global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    project: "onchain-health-monitor"
    environment: "local"

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "collector"
    scrape_interval: 10s
    static_configs:
      - targets: ["collector:8081"]
    metrics_path: /metrics
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: "collector"

  - job_name: "analyzer"
    scrape_interval: 10s
    static_configs:
      - targets: ["analyzer:8082"]
    metrics_path: /metrics
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: "analyzer"

  - job_name: "notifier"
    scrape_interval: 10s
    static_configs:
      - targets: ["notifier:8083"]
    metrics_path: /metrics
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: "notifier"

  - job_name: "api"
    scrape_interval: 10s
    static_configs:
      - targets: ["api:8080"]
    metrics_path: /metrics
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: "api"
